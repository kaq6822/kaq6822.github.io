<!--
    이 파일은 발행용이 아닌 템플릿입니다. GitHub Pages(Jekyll 기본 빌드)는 _로 시작하는
    디렉터리를 배포에서 제외합니다. blog/posts/<slug>.html로 복사한 뒤 {{...}} 토큰을
    전부 치환하세요. 발행 절차는 AGENTS.md '기술 블로그' 섹션 참조.

    치환 대상 토큰:
      {{TITLE}}           - 글 제목
      {{DESCRIPTION}}      - 요약 (meta description, OG/Twitter 설명)
      {{SLUG}}             - 파일명에 쓰인 slug (URL 경로 세그먼트)
      {{PUBLISHED_DATE}}   - 발행일, YYYY-MM-DD 형식
      {{LABEL}}            - 글 분류 라벨. 예: "디버깅" | "아키텍처 결정" | "운영"
      {{CONTENT}}          - 본문 HTML (post-content 내부. h2 섹션 구조는 아래 작성 안내 참조)
-->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} | 강범준 기술 블로그</title>
    <meta name="description" content="{{DESCRIPTION}}">
    <link rel="canonical" href="https://kaq6822.github.io/blog/posts/{{SLUG}}.html">

    <!-- Open Graph -->
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://kaq6822.github.io/blog/posts/{{SLUG}}.html">
    <meta property="og:title" content="{{TITLE}}">
    <meta property="og:description" content="{{DESCRIPTION}}">
    <meta property="og:image" content="https://kaq6822.github.io/images/profile.png">
    <meta property="og:locale" content="ko_KR">
    <meta property="og:site_name" content="강범준 기술 블로그">
    <meta property="article:published_time" content="{{PUBLISHED_DATE}}">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{TITLE}}">
    <meta name="twitter:description" content="{{DESCRIPTION}}">
    <meta name="twitter:image" content="https://kaq6822.github.io/images/profile.png">

    <meta name="theme-color" content="#0a192f">
    <link rel="icon" href="../../images/profile.png" type="image/png">
    <link rel="stylesheet" href="../../style.css">
</head>
<body>
    <a href="#content" class="skip-link">본문으로 건너뛰기</a>

    <header id="site-header" class="site-header--minimal">
        <nav class="nav-container" aria-label="주 메뉴">
            <a href="../../index.html#hero" class="logo" aria-label="홈으로">BJ</a>

            <div class="nav-actions">
                <a href="../index.html" class="btn nav-cta">블로그</a>
                <a href="https://github.com/kaq6822" class="btn nav-cta" target="_blank" rel="noopener noreferrer">GitHub</a>
            </div>
        </nav>
    </header>

    <main id="content">
        <article class="post">
            <header class="post-header">
                <p class="post-label">{{LABEL}}</p>
                <h1 class="post-title">{{TITLE}}</h1>
                <p class="post-meta"><time datetime="{{PUBLISHED_DATE}}">{{PUBLISHED_DATE}}</time></p>
            </header>

            <!--
                본문 작성 안내: 기본 골격은 4단 구조(문제/선택지/결정 근거/결과)의 h2 섹션이며
                글 성격에 따라 섹션을 추가·병합·순서 조정해도 됩니다. 다만 "결과"에는 아쉬운 점
                1개를 반드시 포함하세요. CONTENT 토큰(아래)을 이 구조의 HTML로 치환합니다.
                예: <h2>문제</h2><p>...</p> <h2>선택지</h2><p>...</p>
                    <h2>결정 근거</h2><p>...</p> <h2>결과</h2><p>...</p>
            -->
            <div class="post-content">
{{CONTENT}}
            </div>

            <p class="post-back"><a href="../index.html">← 목록으로 돌아가기</a></p>
        </article>
    </main>

    <footer>
        <ul class="footer-social" aria-label="소셜 링크">
            <li><a href="https://github.com/kaq6822" target="_blank" rel="noopener noreferrer">GitHub</a></li>
            <li><a href="https://www.linkedin.com/in/beomjun6551" target="_blank" rel="noopener noreferrer">LinkedIn</a></li>
            <li><a href="mailto:kaq6822@naver.com">이메일</a></li>
        </ul>
        <p class="footer-credit">강범준이 디자인하고 직접 제작 · © <span id="year">2026</span></p>
    </footer>

    <script src="../../script.js"></script>
</body>
</html>
